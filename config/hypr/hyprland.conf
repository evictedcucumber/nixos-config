source = ~/.config/hypr/windowrules.conf
source = ~/.config/hypr/bindings.conf
source = ~/.config/hypr/noctalia/noctalia-colors.conf

exec-once = noctalia-shell

monitor=,1920x1080,auto,1.25

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = HYPRCURSOR_THEME,catppuccin-mocha-dark-cursors

general {
    gaps_in = 3
    gaps_out = 5
    border_size = 2
    resize_on_border = false
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 10
    rounding_power = 2

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    blur {
        enabled = true
        size = 3
        passes = 2
        vibrancy = 0.1696
    }
}

animations {
    enabled = yes, please :)
}

dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = 1
    disable_hyprland_logo = true
    disable_splash_rendering = true
    vfr = true
}

input {
    kb_layout = za
    touchpad {
        natural_scroll = true
    }
}

gesture = 3, horizontal, workspace

layerrule {
  name = noctalia
  match:namespace = noctalia-background-.*$
  ignore_alpha = 0.5
  blur = true
  blur_popups = true
}
