windowrule {
    name = nm-connection-editor
    match:class = nm-connection-editor
    float = yes
    center = yes
    size = 500 500
}

windowrule {
    name = blueman-manager
    match:class = blueman-manager
    float = yes
    center = yes
    size = 500 500
}

windowrule {
    name = bottom
    match:class = com.mitchellh.ghostty
    match:title = Bottom
    float = yes
    center = yes
    size = 1280 720
}

windowrule {
    name = bitwarden=popup
    match:title = Bitwarden
    float = yes
    center = yes
    size = 400 800
}

windowrule {
    name = suppress-maximize-events
    match:class = .*
    suppress_event = maximize
}

windowrule {
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false
    no_focus = true
}
